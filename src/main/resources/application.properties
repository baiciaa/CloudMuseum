spring.application.name=CloudMuseum_backend

# 服务器端口
server.port=8081

# ========== 数据源配置 ==========
spring.datasource.url=jdbc:mysql://localhost:3306/cloud_museum?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=040918hybHYB
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========== MyBatis 配置 ==========
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.baicai.cloudmuseum_backend.entity
mybatis.configuration.map-underscore-to-camel-case=true

# ========== DashScope 配置 ==========
dashscope.api.key=sk-502e9e61f28e4e29bd837e45d88cf9fb
dashscope.websocket.url=wss://dashscope.aliyuncs.com/api-ws/v1/inference

# ========== AI 文本对话配置 ==========
# type=custom  → 自定义 AI 服务（默认）
# type=openai  → OpenAI 兼容服务（DeepSeek / 通义千问等）
textchat.api.type=custom

# 自定义 AI 服务（textchat.api.type=custom）
textchat.api.base-url=http://26.34.92.227:5000
textchat.api.connect-timeout=15000
textchat.api.read-timeout=60000

# OpenAI 兼容服务（textchat.api.type=openai 时生效）
textchat.openai.api.base-url=https://api.deepseek.com
textchat.openai.api.key=sk-your-deepseek-api-key
textchat.api.model=deepseek-chat
textchat.openai.api.read-timeout=60000

# ========== 高德天气 API 配置 ==========
gaode.weather.api.key=352f017239de4d4c42d318127d1c75f0
gaode.weather.api.base-url=https://restapi.amap.com/v3/weather/weatherInfo

# ========== 文件上传配置 ==========
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ========== 静态资源配置 ==========
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
cloudmuseum.upload.path=./uploads

# ========== 应用基础 URL 与 CDN（部署时配置） ==========
app.base-url=
app.cdn-url=

# ========== Redis 缓存 ==========
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=3000ms

# ========== 慢查询日志（配合 MySQL） ==========
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=20