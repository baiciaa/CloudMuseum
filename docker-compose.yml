version: "3.8"

services:
  mysql:
    image: mysql:8
    container_name: cloudmuseum-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: cloud_museum
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: cloudmuseum-app
    restart: always
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/cloud_museum?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      TEXTCHAT_API_BASE_URL: ${TEXTCHAT_API_BASE_URL}
      GAODE_WEATHER_API_KEY: ${GAODE_WEATHER_API_KEY}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - uploads-data:/app/uploads

volumes:
  mysql-data:
  uploads-data:
