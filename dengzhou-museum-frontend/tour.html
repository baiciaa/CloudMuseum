<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登州博物馆 · 云端漫游 | DENGZHOU MUSEUM VR TOUR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;700&display=swap');

        :root {
            --gold: #c4a265;
            --font-display: 'Noto Serif SC', serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #vrFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        .tour-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }
        .tour-header > * { pointer-events: auto; }

        .tour-header .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .tour-header .back-btn:hover {
            background: rgba(196, 162, 101, 0.3);
            border-color: var(--gold);
            color: var(--gold);
        }
        .tour-header .museum-title {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--gold);
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .hint-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* ========== 登州小吏 浮动按钮 ========== */
        .tour-digital-human {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .tour-digital-human:hover { transform: scale(1.05); }
        .tour-dh-container {
            width: 200px;
            height: 280px;
            pointer-events: none;
            position: relative;
        }
        .tour-dh-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .tour-dh-fallback {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(196,162,101,0.08) 0%, transparent 70%);
            border-radius: 50% 50% 40% 40%;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .tour-dh-fallback .icon {
            font-size: 80px;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(196,162,101,0.3));
        }
        .tour-dh-fallback .ring {
            position: absolute;
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 1px solid rgba(196,162,101,0.15);
            animation: pulse-ring 3s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(0.9); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        .tour-dh-fallback.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .tour-dh-label {
            text-align: center;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-top: -2px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            font-family: var(--font-display);
        }

        /* ========== 登州小吏 气泡提示 ========== */
        .tour-dh-tooltip {
            position: fixed;
            bottom: 370px;
            right: 30px;
            z-index: 20;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(196,162,101,0.3);
            border-radius: 8px;
            padding: 14px 18px;
            max-width: 260px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            line-height: 1.6;
            font-family: var(--font-body);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .tour-dh-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 40px;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(0,0,0,0.75);
        }
        .tour-dh-tooltip.visible { opacity: 1; transform: translateY(0); }
        .tour-dh-tooltip .close-hint {
            display: block;
            margin-top: 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .tour-header .museum-title { font-size: 13px; letter-spacing: 2px; }
            .hint-text { font-size: 10px; bottom: 20px; }
            .tour-digital-human { bottom: 60px; right: 10px; }
            .tour-dh-container { width: 140px; height: 200px; }
            .tour-dh-fallback .icon { font-size: 60px; }
            .tour-dh-fallback .ring { width: 110px; height: 110px; }
            .tour-dh-tooltip { right: 10px; max-width: 200px; font-size: 12px; }
            .tour-chat-panel { right: 10px; width: calc(100vw - 20px); max-width: 340px; bottom: 10px; max-height: 60vh; }
        }

        /* ========== 聊天对话框 ========== */
        .tour-chat-overlay {
            position: fixed;
            bottom: 0;
            right: 0;
            z-index: 30;
            display: none;
        }
        .tour-chat-overlay.open { display: block; }
        .tour-chat-panel {
            position: fixed;
            right: 20px;
            bottom: 380px;
            width: 360px;
            max-height: 70vh;
            background: rgba(10,10,15,0.92);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200,164,92,0.2);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            overflow: hidden;
            animation: chatSlideIn .3s ease;
        }
        @keyframes chatSlideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .tour-chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255,255,255,.06);
            background: rgba(200,164,92,.08);
        }
        .tour-chat-header-title {
            font-family: var(--font-display);
            font-size: 14px;
            color: var(--gold);
            letter-spacing: 1px;
        }
        .tour-chat-close {
            background: none;
            border: none;
            color: rgba(255,255,255,.4);
            font-size: 20px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
        }
        .tour-chat-close:hover { color: #fff; }
        .tour-chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            min-height: 100px;
            max-height: 400px;
        }
        .tour-chat-bubble {
            margin-bottom: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.7;
            max-width: 85%;
            white-space: pre-wrap;
        }
        .tour-chat-bubble.user {
            background: rgba(200,164,92,.2);
            color: #e8d8b8;
            margin-left: auto;
            border-radius: 8px 2px 8px 8px;
        }
        .tour-chat-bubble.assistant {
            background: rgba(255,255,255,.06);
            color: rgba(255,255,255,.85);
            margin-right: auto;
            border-radius: 2px 8px 8px 8px;
        }
        .tour-chat-bubble.typing {
            color: rgba(255,255,255,.4);
            font-style: italic;
        }
        .tour-chat-input-area {
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            border-top: 1px solid rgba(255,255,255,.06);
        }
        .tour-chat-input {
            flex: 1;
            background: rgba(255,255,255,.06);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 6px;
            padding: 10px 14px;
            color: #e8e0d0;
            font-size: 13px;
            outline: none;
            font-family: var(--font-body);
        }
        .tour-chat-input:focus { border-color: rgba(200,164,92,.4); }
        .tour-chat-input::placeholder { color: rgba(255,255,255,.2); }
        .tour-chat-send {
            background: rgba(200,164,92,.2);
            border: 1px solid rgba(200,164,92,.3);
            border-radius: 6px;
            color: var(--gold);
            padding: 0 16px;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
        }
        .tour-chat-send:hover { background: rgba(200,164,92,.35); }
        .tour-chat-send:disabled { opacity: .3; cursor: not-allowed; }
    </style>
</head>
<body>

    <iframe
        id="vrFrame"
        src="/uploads/mingren/index.html"
        allow="autoplay; fullscreen; pointer-lock"
        allowfullscreen="true">
    </iframe>

    <header class="tour-header">
        <button class="back-btn" onclick="goBack()">
            <span>&larr;</span> 返回首页
        </button>
        <span class="museum-title">登州博物馆 &middot; 云端漫游</span>
        <div></div>
    </header>

    <div class="hint-text">&#x1f5b1; 鼠标拖拽旋转视角 &nbsp;|&nbsp; W/A/S/D 移动 &nbsp;|&nbsp; 点击画面锁定鼠标</div>

    <!-- 登州小吏 浮动按钮 -->
    <div class="tour-digital-human" id="tourDigitalHuman" title="登州小吏">
        <div class="tour-dh-container" id="dhContainer">
            <div class="tour-dh-fallback" id="dhFallback">
                <div class="ring"></div>
                <span class="icon">&#x1f9d9;</span>
            </div>
        </div>
        <div class="tour-dh-label">登州小吏</div>
    </div>

    <!-- 登州小吏 气泡 -->
    <div class="tour-dh-tooltip" id="dhTooltip">
        在下登州小吏，云端导览使。<br>
        此间乃登州博物馆名人厅，<br>
        请君随意游览。
        <span class="close-hint">点击小吏打开聊天</span>
    </div>

    <!-- 聊天对话框 -->
    <div class="tour-chat-overlay" id="tourChatOverlay">
        <div class="tour-chat-panel">
            <div class="tour-chat-header">
                <span class="tour-chat-header-title">&#x1f3ef; 登州小吏</span>
                <button class="tour-chat-close" id="tourChatClose">&times;</button>
            </div>
            <div class="tour-chat-body" id="tourChatBody">
                <div class="tour-chat-bubble assistant">在下登州小吏，乃登州博物馆云端导览使。&#10;&#10;若有疑问，尽管道来。</div>
            </div>
            <div class="tour-chat-input-area">
                <input type="text" class="tour-chat-input" id="tourChatInput" placeholder="输入您的问题..." />
                <button class="tour-chat-send" id="tourChatSend">发送</button>
            </div>
        </div>
    </div>

    <script>
        window.goBack = function() { window.location.href = '/'; };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Backspace' && e.target.tagName === 'INPUT') return;
            if (e.key === 'Escape' || e.key === 'Backspace') {
                e.preventDefault();
                window.goBack();
            }
        });
    </script>

    <script type="module">
        import { initDigitalHuman } from './src/three/DigitalHuman.js';
        import { chatApi } from './src/api/index.js';

        // ==== 3D 数字人 ====
        const container = document.getElementById('dhContainer');
        const btn = document.getElementById('tourDigitalHuman');
        const tooltip = document.getElementById('dhTooltip');
        const fallback = document.getElementById('dhFallback');

        if (container) {
            try {
                initDigitalHuman(container);
                const checkLoaded = setInterval(function() {
                    if (container.classList.contains('model-loaded')) {
                        if (fallback) fallback.classList.add('hidden');
                        clearInterval(checkLoaded);
                    }
                    if (container.classList.contains('model-failed')) {
                        clearInterval(checkLoaded);
                    }
                }, 500);
            } catch(e) {
                console.error('3D数字人初始化失败:', e);
            }
        }

        // ==== 聊天 ====
        const overlay = document.getElementById('tourChatOverlay');
        const chatBody = document.getElementById('tourChatBody');
        const chatInput = document.getElementById('tourChatInput');
        const chatSend = document.getElementById('tourChatSend');
        const chatClose = document.getElementById('tourChatClose');
        let chatBusy = false;
        let abortCtrl = null;

        function addBubble(role, text) {
            const div = document.createElement('div');
            div.className = 'tour-chat-bubble ' + role;
            div.textContent = text;
            chatBody.appendChild(div);
            chatBody.scrollTop = chatBody.scrollHeight;
            return div;
        }

        function removeTyping() {
            const t = chatBody.querySelector('.typing');
            if (t) t.remove();
        }

        async function sendMessage() {
            const text = chatInput.value.trim();
            if (!text || chatBusy) return;
            chatInput.value = '';
            addBubble('user', text);
            chatBusy = true;
            chatSend.disabled = true;
            chatInput.disabled = true;
            const typingEl = addBubble('typing', '登州小吏正在思索...');
            abortCtrl = new AbortController();
            try {
                const prompt = '你是"登州小吏"，登州博物馆的云端导览使，一位学识渊博、谈吐文雅的博物馆讲解员。\n' +
                    '你在登州博物馆名人厅值守，为游客讲解历史文化。\n' +
                    '你的回答应使用文言白话相间的风格，简洁而有文采。\n\n' +
                    '游客问：' + text + '\n\n请以登州小吏的口吻回复：';
                const res = await chatApi.ask(prompt, abortCtrl.signal);
                removeTyping();
                addBubble('assistant', res.answer || '小吏才疏学浅，容后再禀。');
            } catch(e) {
                removeTyping();
                if (e.name !== 'AbortError') {
                    addBubble('assistant', '小吏暂时无法作答，请稍后再试。');
                }
            } finally {
                chatBusy = false;
                chatSend.disabled = false;
                chatInput.disabled = false;
                chatInput.focus();
                abortCtrl = null;
            }
        }

        function openChat() {
            overlay.classList.add('open');
            tooltip.classList.remove('visible');
            setTimeout(function() { chatInput.focus(); }, 300);
        }

        function closeChat() {
            if (abortCtrl) { abortCtrl.abort(); abortCtrl = null; }
            chatBusy = false;
            chatSend.disabled = false;
            chatInput.disabled = false;
            overlay.classList.remove('open');
        }

        // 点击数字人 → 打开聊天
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (overlay.classList.contains('open')) {
                    closeChat();
                } else {
                    openChat();
                }
            });
        }

        // 关闭按钮
        if (chatClose) chatClose.addEventListener('click', closeChat);

        // 发送
        if (chatSend) chatSend.addEventListener('click', sendMessage);
        if (chatInput) chatInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // 首次加载显示气泡
        setTimeout(function() { tooltip.classList.add('visible'); }, 1000);
        setTimeout(function() { tooltip.classList.remove('visible'); }, 8000);

        // 网站浏览统计
        fetch('/api/visits/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pagePath: '/tour.html' }),
            keepalive: true
        }).catch(function(){});
    </script>
</body>
</html>
