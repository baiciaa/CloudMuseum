<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登州博物馆 · 云端漫游 | DENGZHOU MUSEUM VR TOUR</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;700&display=swap');

        :root {
            --gold: #c4a265;
            --font-display: 'Noto Serif SC', serif;
            --font-body: 'Inter', 'Noto Sans SC', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: #000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #vrFrame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
        }

        .tour-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            height: 56px;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }
        .tour-header > * { pointer-events: auto; }

        .tour-header .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-family: var(--font-display);
            font-size: 12px;
            color: rgba(255,255,255,0.8);
            letter-spacing: 2px;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .tour-header .back-btn:hover {
            background: rgba(196, 162, 101, 0.3);
            border-color: var(--gold);
            color: var(--gold);
        }
        .tour-header .museum-title {
            font-family: var(--font-display);
            font-size: 16px;
            color: var(--gold);
            letter-spacing: 4px;
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0,0,0,0.6);
        }

        .hint-text {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        /* ========== 登州小吏 浮动按钮 ========== */
        .tour-digital-human {
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 20;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .tour-digital-human:hover { transform: scale(1.05); }
        .tour-dh-container {
            width: 100px;
            height: 140px;
            pointer-events: none;
            position: relative;
        }
        .tour-dh-container canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
        }
        .tour-dh-fallback {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center, rgba(196,162,101,0.08) 0%, transparent 70%);
            border-radius: 50% 50% 40% 40%;
            opacity: 1;
            transition: opacity 0.5s;
        }
        .tour-dh-fallback .icon {
            font-size: 40px;
            line-height: 1;
            filter: drop-shadow(0 2px 8px rgba(196,162,101,0.3));
        }
        .tour-dh-fallback .ring {
            position: absolute;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 1px solid rgba(196,162,101,0.15);
            animation: pulse-ring 3s ease-in-out infinite;
        }
        @keyframes pulse-ring {
            0%, 100% { transform: scale(0.9); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.6; }
        }
        .tour-dh-fallback.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .tour-dh-label {
            text-align: center;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 2px;
            margin-top: -2px;
            text-shadow: 0 1px 6px rgba(0,0,0,0.8);
            pointer-events: none;
            font-family: var(--font-display);
        }

        /* ========== 登州小吏 气泡提示 ========== */
        .tour-dh-tooltip {
            position: fixed;
            bottom: 230px;
            right: 30px;
            z-index: 20;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(196,162,101,0.3);
            border-radius: 8px;
            padding: 14px 18px;
            max-width: 260px;
            color: rgba(255,255,255,0.9);
            font-size: 13px;
            line-height: 1.6;
            font-family: var(--font-body);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }
        .tour-dh-tooltip::after {
            content: '';
            position: absolute;
            bottom: -8px;
            right: 40px;
            width: 0; height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(0,0,0,0.75);
        }
        .tour-dh-tooltip.visible { opacity: 1; transform: translateY(0); }
        .tour-dh-tooltip .close-hint {
            display: block;
            margin-top: 8px;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            .tour-header .museum-title { font-size: 13px; letter-spacing: 2px; }
            .hint-text { font-size: 10px; bottom: 20px; }
            .tour-digital-human { bottom: 60px; right: 10px; }
            .tour-dh-container { width: 70px; height: 100px; }
            .tour-dh-fallback .icon { font-size: 30px; }
            .tour-dh-fallback .ring { width: 56px; height: 56px; }
            .tour-dh-tooltip { right: 10px; max-width: 200px; font-size: 12px; }
        }
    </style>
</head>
<body>

    <iframe
        id="vrFrame"
        src="/uploads/mingren/index.html"
        allow="autoplay; fullscreen; pointer-lock"
        allowfullscreen="true">
    </iframe>

    <header class="tour-header">
        <button class="back-btn" onclick="goBack()">
            <span>&larr;</span> 返回首页
        </button>
        <span class="museum-title">登州博物馆 &middot; 云端漫游</span>
        <div></div>
    </header>

    <div class="hint-text">&#x1f5b1; 鼠标拖拽旋转视角 &nbsp;|&nbsp; W/A/S/D 移动 &nbsp;|&nbsp; 点击画面锁定鼠标</div>

    <!-- 登州小吏 浮动按钮 -->
    <div class="tour-digital-human" id="tourDigitalHuman" title="登州小吏">
        <div class="tour-dh-container" id="dhContainer">
            <div class="tour-dh-fallback" id="dhFallback">
                <div class="ring"></div>
                <span class="icon">&#x1f9d9;</span>
            </div>
        </div>
        <div class="tour-dh-label">登州小吏</div>
    </div>

    <!-- 登州小吏 气泡 -->
    <div class="tour-dh-tooltip" id="dhTooltip">
        在下登州小吏，云端导览使。<br>
        此间乃登州博物馆名人厅，<br>
        请君随意游览。
        <span class="close-hint">点击小吏关闭提示</span>
    </div>

    <script>
        window.goBack = function() { window.location.href = '/'; };
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' || e.key === 'Backspace') {
                e.preventDefault();
                window.goBack();
            }
        });
    </script>

    <script type="module">
        import { initDigitalHuman } from './src/three/DigitalHuman.js';

        const container = document.getElementById('dhContainer');
        const btn = document.getElementById('tourDigitalHuman');
        const tooltip = document.getElementById('dhTooltip');
        const fallback = document.getElementById('dhFallback');

        if (container) {
            try {
                const dh = initDigitalHuman(container);
                // 3D 初始化成功（至少 renderer 已创建），隐藏 fallback
                // GLB 加载完成后，model-loaded class 会加到 container 上
                const checkLoaded = setInterval(function() {
                    if (container.classList.contains('model-loaded')) {
                        if (fallback) fallback.classList.add('hidden');
                        clearInterval(checkLoaded);
                    }
                    if (container.classList.contains('model-failed')) {
                        clearInterval(checkLoaded);
                    }
                }, 500);
            } catch(e) {
                console.error('3D数字人初始化失败:', e);
            }
        }

        // 点击交互
        let tooltipVisible = true;
        if (btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                tooltipVisible = !tooltipVisible;
                tooltip.classList.toggle('visible', tooltipVisible);
            });
        }
        setTimeout(function() { tooltip.classList.add('visible'); }, 1000);
        setTimeout(function() {
            tooltip.classList.remove('visible');
            tooltipVisible = false;
        }, 8000);

        document.addEventListener('click', function(e) {
            if (!btn.contains(e.target) && !tooltip.contains(e.target)) {
                tooltip.classList.remove('visible');
                tooltipVisible = false;
            }
        });

        // 网站浏览统计
        fetch('/api/visits/track', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pagePath: '/tour.html' }),
            keepalive: true
        }).catch(function(){});
    </script>
</body>
</html>
